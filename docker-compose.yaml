services:
  freepibx:
    container_name: freepibx
    image: bndgzglln23/pibpx:latest
    network_mode: host
    volumes:
      - ./data/certs:/certs
      - ./data/data:/data
      - ./data/logs:/var/log
      - ./data/www:/var/www/html
      - ./data/db:/var/lib/mysql
      - ./data/var/www/:/etc/caddy/
    environment:
      - HTTP_PORT=8099
      - HTTPS_PORT=8443
      - RTP_START=10000
      - RTP_FINISH=11000
      - DB_EMBEDDED=TRUE
      - DEBUG_MODE=FALSE
      - ENABLE_SSL=FALSE
      - ENABLE_FOP=FALSE
      - ENABLE_FAIL2BAN=TRUE
      - UCP_FIRST=TRUE
      - ENABLE_SMTP=TRUE
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      - SMTP_MAILDOMAIN=${SMTP_MAILDOMAIN}
      - SMTP_AUTHENTICATION=${SMTP_AUTHENTICATION}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_TLS=${SMTP_TLS}
      - SMTP_STARTTLS=${SMTP_STARTTLS}
      - SMTP_TLSCERTCHECK=${SMTP_TLSCERTCHECK}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8099/admin/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
